<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" /> <!-- darker blue -->
      <stop offset="100%" stop-color="#9333ea" /> <!-- purple -->
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="#0f172a" /> <!-- dark slate background -->
  
  <!-- "M" shape forming a neural/data pathway -->
  <path d="M25,75 V45 C25,30 35,20 45,35 L50,42 L55,35 C65,20 75,30 75,45 V75" 
        fill="none" stroke="url(#gradFull)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
        
  <!-- 3 prominent data nodes -->
  <circle cx="25" cy="45" r="6" fill="#60a5fa" />
  <circle cx="50" cy="42" r="6" fill="#c084fc" />
  <circle cx="75" cy="45" r="6" fill="#e879f9" />
</svg>
